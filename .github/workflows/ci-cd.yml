name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force all jobs to run"
        type: boolean
        default: false

jobs:
  # ---------------------------------------------------------------------------
  # Change detection
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ingestor: ${{ steps.filter.outputs.ingestor }}
      transformer-v2: ${{ steps.filter.outputs.transformer-v2 }}
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
      retl: ${{ steps.filter.outputs.retl }}
      insights: ${{ steps.filter.outputs.insights }}
      dbt: ${{ steps.filter.outputs.dbt }}
      infra: ${{ steps.filter.outputs.infra }}
      infra-ui: ${{ steps.filter.outputs.infra-ui }}
      any-backend-service: ${{ steps.filter.outputs.any-backend-service }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ingestor:
              - 'ingestor/**'
            transformer-v2:
              - 'transformer-v2/**'
            api:
              - 'api/**'
            ui:
              - 'ui/**'
            retl:
              - 'retl/**'
            insights:
              - 'insights/**'
            dbt:
              - 'dbt/**'
              - '.dbt/**'
            infra:
              - 'infra/**'
            infra-ui:
              - 'infra-ui/**'
            any-backend-service:
              - 'ingestor/**'
              - 'transformer-v2/**'
              - 'api/**'
              - 'retl/**'
              - 'insights/**'

  # ---------------------------------------------------------------------------
  # Test jobs
  # ---------------------------------------------------------------------------
  test-ingestor:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.ingestor == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: ingestor

  test-transformer-v2:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs['transformer-v2'] == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: transformer-v2

  test-api:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.api == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: api

  test-ui:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.ui == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: ui

  test-retl:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.retl == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: retl

  test-insights:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.insights == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: insights

  # ---------------------------------------------------------------------------
  # Build jobs
  # ---------------------------------------------------------------------------
  build-ingestor:
    needs: [detect-changes, test-ingestor]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.ingestor == 'true' ||
       inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: ingestor
      image_prefix: "infass-"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-transformer-v2:
    needs: [detect-changes, test-transformer-v2]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs['transformer-v2'] == 'true' ||
       inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: transformer-v2
      image_prefix: "infass-"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-api:
    needs: [detect-changes, test-api]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.api == 'true' ||
       inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: api
      image_prefix: "infass-"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-ui:
    needs: [detect-changes, test-ui]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.ui == 'true' ||
       inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: ui
      image_prefix: "infass-"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-retl:
    needs: [detect-changes, test-retl]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.retl == 'true' ||
       inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: retl
      image_prefix: "infass-"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-insights:
    needs: [detect-changes, test-insights]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.insights == 'true' ||
       inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: insights
      image_prefix: "infass-"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Terraform deploy — resolve tags then call reusable workflow
  # ---------------------------------------------------------------------------
  resolve-tags:
    name: Resolve Docker image tags
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-ingestor
      - build-transformer-v2
      - build-api
      - build-retl
      - build-insights
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.any-backend-service == 'true' ||
       needs.detect-changes.outputs.infra == 'true' ||
       inputs.force_all == true)
    outputs:
      terraform_vars: ${{ steps.tags.outputs.terraform_vars }}
      env_vars: ${{ steps.env.outputs.env_vars }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CICD_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.10.4

      - name: Initialize Terraform
        working-directory: ./infra
        run: terraform init

      - name: Determine Docker image tags
        id: tags
        working-directory: ./infra
        run: |
          FORCE="${{ inputs.force_all }}"

          # Read current tags from Terraform state (last successful apply).
          # For unchanged services we re-use the existing tag so Terraform
          # sees no diff and skips redeployment.
          current_tag() {
            terraform output -raw "$1" 2>/dev/null || echo "${GITHUB_SHA::7}"
          }

          resolve_tag() {
            local KEY="$1" CHANGED="$2"
            if [[ "$CHANGED" == "true" || "$FORCE" == "true" ]]; then
              echo "${GITHUB_SHA::7}"
            else
              current_tag "docker_image_tag_$(echo "$KEY" | tr '[:upper:]' '[:lower:]')"
            fi
          }

          TAG_INGESTOR=$(resolve_tag INGESTOR '${{ needs.detect-changes.outputs.ingestor }}')
          TAG_TRANSFORMER_V2=$(resolve_tag TRANSFORMER_V2 '${{ needs.detect-changes.outputs['transformer-v2'] }}')
          TAG_API=$(resolve_tag API '${{ needs.detect-changes.outputs.api }}')
          TAG_RETL=$(resolve_tag RETL '${{ needs.detect-changes.outputs.retl }}')

          echo "terraform_vars=-var \"DOCKER_IMAGE_TAG_INGESTOR=${TAG_INGESTOR}\" -var \"DOCKER_IMAGE_TAG_TRANSFORMER_V2=${TAG_TRANSFORMER_V2}\" -var \"DOCKER_IMAGE_TAG_API=${TAG_API}\" -var \"DOCKER_IMAGE_TAG_RETL=${TAG_RETL}\"" >> "$GITHUB_OUTPUT"

      - name: Build env vars
        id: env
        run: |
          EOF_MARKER=$(uuidgen)
          {
            echo "env_vars<<${EOF_MARKER}"
            echo "TF_VAR_APP_NAME=infass"
            echo "TF_VAR_PROJECT=${{ secrets.GCP_PROJECT_ID }}"
            echo "TF_VAR_REGION=europe-southwest1"
            echo "TF_VAR_DOCKER_HUB_USERNAME=${{ secrets.DOCKER_USERNAME }}"
            echo "TF_VAR_GCP_USER=${{ secrets.GCP_USER }}"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

  terraform-deploy:
    needs: [resolve-tags]
    if: always() && !failure() && !cancelled() && needs.resolve-tags.result == 'success'
    uses: gerardovitale/github-workflows/.github/workflows/terraform-deploy.yml@v1
    with:
      working_directory: ./infra
      terraform_vars: ${{ needs.resolve-tags.outputs.terraform_vars }}
      env_vars: ${{ needs.resolve-tags.outputs.env_vars }}
    secrets:
      gcp_credentials: ${{ secrets.GCP_CICD_CREDENTIALS }}

  # ---------------------------------------------------------------------------
  # Terraform deploy (UI) — resolve tag then call reusable workflow
  # ---------------------------------------------------------------------------
  resolve-ui-tag:
    name: Resolve UI Docker image tag
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-ui
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.ui == 'true' ||
       needs.detect-changes.outputs.infra-ui == 'true' ||
       inputs.force_all == true)
    outputs:
      terraform_vars: ${{ steps.tag.outputs.terraform_vars }}
      env_vars: ${{ steps.env.outputs.env_vars }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_UI_CICD_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.10.4

      - name: Initialize Terraform
        working-directory: ./infra-ui
        run: terraform init

      - name: Determine Docker image tag
        id: tag
        working-directory: ./infra-ui
        run: |
          if [[ "${{ needs.detect-changes.outputs.ui }}" == "true" \
              || "${{ inputs.force_all }}" == "true" ]]; then
            DOCKER_TAG="${GITHUB_SHA::7}"
          else
            DOCKER_TAG="$(terraform output -raw docker_image_tag 2>/dev/null || echo "${GITHUB_SHA::7}")"
          fi
          echo "terraform_vars=-var \"DOCKER_IMAGE_TAG=${DOCKER_TAG}\"" >> "$GITHUB_OUTPUT"

      - name: Build env vars
        id: env
        run: |
          EOF_MARKER=$(uuidgen)
          {
            echo "env_vars<<${EOF_MARKER}"
            echo "TF_VAR_APP_NAME=infass"
            echo "TF_VAR_REGION=europe-southwest1"
            echo "TF_VAR_DOCKER_HUB_USERNAME=${{ secrets.DOCKER_USERNAME }}"
            echo "TF_VAR_GCP_API_URL=${{ vars.GCP_API_URL }}"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

  terraform-ui-deploy:
    needs: [resolve-ui-tag]
    if: always() && !failure() && !cancelled() && needs.resolve-ui-tag.result == 'success'
    uses: gerardovitale/github-workflows/.github/workflows/terraform-deploy.yml@v1
    with:
      working_directory: ./infra-ui
      terraform_vars: ${{ needs.resolve-ui-tag.outputs.terraform_vars }}
      env_vars: ${{ needs.resolve-ui-tag.outputs.env_vars }}
    secrets:
      gcp_credentials: ${{ secrets.GCP_UI_CICD_CREDENTIALS }}

  # ---------------------------------------------------------------------------
  # dbt
  # ---------------------------------------------------------------------------
  build-dbt:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.dbt == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/run-dbt.yml@v1
    with:
      dbt_profile: infass
      dbt_target: test
      dbt_subcommand: build
      dbt_args: "" # e.g. "--select tag:nightly"
    secrets:
      gcp_credentials: ${{ secrets.GCP_DBT_CREDENTIALS }}
